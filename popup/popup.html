<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vox Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 240px;
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      border-radius: 12px;
      overflow: hidden;
    }

    .header {
      padding: 16px 18px 12px;
      background: linear-gradient(135deg, #141414 0%, #0f0f0f 100%);
      border-bottom: 1px solid #1e1e1e;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: #f59e0b;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #f0f0f0;
    }

    .logo-sub {
      font-size: 10px;
      color: #555;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding-left: 36px;
    }

    .main-btn {
      display: block;
      width: calc(100% - 32px);
      margin: 14px 16px;
      padding: 11px;
      background: #f59e0b;
      color: #0a0a0a;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.02em;
    }

    .main-btn:hover {
      background: #fbbf24;
      transform: translateY(-1px);
    }

    .main-btn:active {
      transform: translateY(0);
    }

    .shortcuts {
      padding: 0 16px 14px;
      border-top: 1px solid #141414;
    }

    .shortcuts-title {
      font-size: 9px;
      color: #444;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 10px 0 8px;
    }

    .shortcut-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }

    .shortcut-desc {
      font-size: 11px;
      color: #888;
    }

    .shortcut-key {
      font-size: 10px;
      color: #555;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 2px 6px;
      font-family: monospace;
    }

    .footer {
      padding: 8px 16px 12px;
      border-top: 1px solid #141414;
      font-size: 10px;
      color: #333;
      text-align: center;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-row">
      <div class="logo-icon">⬡</div>
      <span class="logo-text">Vox Reader</span>
    </div>
    <div class="logo-sub">Text to Speech</div>
  </div>

  <button class="main-btn" id="open-player">Open Player on Page</button>

  <div class="shortcuts">
    <div class="shortcuts-title">Keyboard Shortcuts</div>
    <div class="shortcut-row">
      <span class="shortcut-desc">Play / Pause</span>
      <span class="shortcut-key" id="sc-play-display">Alt+P</span>
    </div>
    <div class="shortcut-row">
      <span class="shortcut-desc">Stop</span>
      <span class="shortcut-key" id="sc-stop-display">Alt+S</span>
    </div>
    <div class="shortcut-row">
      <span class="shortcut-desc">Read selection</span>
      <span class="shortcut-key" id="sc-read-display">Alt+R</span>
    </div>
  </div>

  <div class="footer">Free · Private · No account needed</div>

  <script src="popup.js"></script>
</body>
</html>
